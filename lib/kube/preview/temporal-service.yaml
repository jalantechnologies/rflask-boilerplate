apiVersion: v1
kind: Service
metadata:
  name: "$KUBE_APP-temporal-service"
  namespace: $KUBE_NS
spec:
  selector:
    app: temporal
    pr: "$KUBE_DEPLOY_ID"
  ports:
    - name: temporal-grpc
      protocol: TCP
      port: 7233
      targetPort: 7233
    - name: temporal-ui
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer
